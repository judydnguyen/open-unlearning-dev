# @package _global_
# Relearning attack experiment: fine-tune an unlearned model on the forget set
# and observe how quickly forgotten knowledge recovers.
# Use with model.model_args.pretrained_model_name_or_path=<unlearned_checkpoint>

defaults:
  - override /model: Llama-3.2-1B-Instruct
  - override /trainer: finetune
  - override /data/datasets@data.train: TOFU_QA_forget
  - override /eval: tofu

mode: finetune

forget_split: forget01
holdout_split: holdout01
retain_logs_path: null
question_key: "question"

data:
  train:
    TOFU_QA_forget:
      args:
        hf_args:
          name: ${forget_split}
        question_key: ${question_key}

trainer:
  method_args:
    save_checkpoint_at_eval: true  # save model weights in checkpoint-N/ alongside eval results

  args:
    learning_rate: 5e-5
    weight_decay: 0.01
    warmup_ratio: 0.0
    num_train_epochs: 3
    save_strategy: steps
    save_steps: 10
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    gradient_checkpointing: true
    ddp_find_unused_parameters: false

eval:
  tofu:
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    question_key: ${question_key}
    overwrite: true

task_name: ???
