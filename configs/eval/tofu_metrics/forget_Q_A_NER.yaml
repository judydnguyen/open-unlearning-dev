# @package eval.tofu.metrics.forget_Q_A_NER
defaults:
  - ../../data/datasets@datasets: TOFU_QA_forget
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex
  - ../../generation@generation_args: default

handler: entity_forget
batch_size: ${eval.tofu.batch_size}

datasets:
  TOFU_QA_forget:
    args:
      hf_args:
        name: ${eval.tofu.forget_split}_perturbed
      question_key: ${eval.tofu.question_key}
      predict_with_generate: True
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
