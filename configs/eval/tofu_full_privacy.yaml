# @package eval.tofu
# Full privacy eval: identical to tofu.yaml but with all MIA metrics enabled.
# Use for comparing privacy/security properties across unlearning methods.

defaults:
  - tofu_metrics:
    - forget_Truth_Ratio
    - forget_quality
    - forget_Q_A_Prob
    - forget_Q_A_ROUGE
    - model_utility
    - privleak
    - extraction_strength
    - forget_Q_A_NER
    - exact_memorization
    - mia_min_k_plus_plus
    - mia_min_k
    - mia_loss
    - mia_zlib
    - mia_gradnorm

handler: TOFUEvaluator
output_dir: ${paths.output_dir}
metrics: {}
overwrite: false
forget_split: forget10
holdout_split: holdout10
retain_logs_path: null
question_key: "question"
batch_size: 32
