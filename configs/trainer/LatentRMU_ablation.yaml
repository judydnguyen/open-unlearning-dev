defaults:
  - GradDiff

handler: LatentRMU

# Base hyperparameters matching tofu_Llama-3.2-1B-Instruct_forget01_LatentRMU_v4.8_sweep.
# Override individual method_args in the ablation script to isolate each component.
args:
  learning_rate: 2e-5
  num_train_epochs: 12
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  logging_steps: 10
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false

method_args:
  module_regex: "model\\.layers\\.7"
  trainable_params_regex:
    - ".*"
  latent_dim: 256
  encoder_layers: 2
  encoder_epochs: 6
  encoder_lr: 1e-3
  steering_coeff: 5
  orth_weight: 2.0
  retain_sep_weight: 2.0
  anchor_weight: 1.0
  forget_warmup_steps: 10
  gamma: 1.0
  alpha: 2.0
  retain_loss_type: EMBED_DIFF
  use_lora: false
  retain_pca_components: 64
