defaults:
  - finetune

handler: BTPairDPO

args:
  learning_rate: 1e-5
  num_train_epochs: 5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  ddp_find_unused_parameters: false
  gradient_checkpointing: true

method_args:
  # Path to the pre-built bt_pairs.jsonl from RewardUnlearn Phase 1
  bt_pairs_path: "saves/unlearn/tofu_Llama-3.2-1B-Instruct_forget01_RewardUnlearn_v1.2/reward_model/bt_pairs.jsonl"

  # DPO temperature: lower = sharper preference margin
  dpo_beta: 0.1

  # Forget loss weight (gamma) and retain NLL weight (alpha) from GradDiff
  gamma: 1.0
  alpha: 1.0

  max_seq_length: 512

  # Minimum |reward_b - reward_a| to keep a pair (0.0 = keep all)
  min_reward_gap: 0.0

  # Restrict to specific pair types for cleaner signal:
  #   "L0-L2" = ground truth vs refusal (strongest signal)
  #   "L0-L1" = ground truth vs confabulation
  #   "L1-L2" = confabulation vs refusal
  # null = use all pair types
  pair_level_filter: null
