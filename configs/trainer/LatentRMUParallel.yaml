defaults:
  - GradDiff

handler: LatentRMUParallel

args:
  learning_rate: 1e-5
  num_train_epochs: 10

method_args:
  # Layer to hook activations from
  module_regex: "model\\.layers\\.7"

  # Params to update during Phase 2 (RMU-style)
  trainable_params_regex:
    - ".*"

  # Encoder / Phase 1
  latent_dim: 256
  encoder_layers: 2
  encoder_epochs: 0
  encoder_lr: 1e-3

  # Phase 2 warmup: linearly ramp forget loss from 0→1 over N steps (0 = off)
  forget_warmup_steps: 0

  # Phase 2 (RMU unlearning)
  steering_coeff: 20
  orth_weight: 1.0

  # Inherited from GradDiff / RMU
  gamma: 1.0
  alpha: 1.0
  retain_loss_type: EMBED_DIFF
