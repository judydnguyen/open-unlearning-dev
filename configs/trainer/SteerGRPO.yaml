defaults:
  - finetune

handler: SteerGRPO
method_args:
  group_size: 4             # G completions sampled per forget question
  max_new_tokens: 64
  temperature: 1.0
  epsilon: 0.2              # PPO-style clipping (0 = no clip)
  naturalness_tau: 0.8
  naturalness_reward_weight: 0.0   # 0 = off; >0 = penalise representation drift
  hidden_layer: -2
  ga_warmup_steps: 20
  answer_reward_weight: 0.5
  resample_low_var: true
  resample_var_threshold: 0.02
  resample_temp_factor: 1.5
  resample_max_tries: 3
  curriculum: true
  curriculum_ema_alpha: 0.1
  curriculum_softmax_temp: 2.0
  retain_loss_weight: 0.0
  entropy_beta: 0.0
  log_completions_steps: 10
  use_lora: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: null
  kl_beta: 0.0
