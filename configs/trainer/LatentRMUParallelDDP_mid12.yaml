defaults:
  - LatentRMUParallelDDP

# Hook layer 12 (mid-early) with trainable layers 9-12.
# Diagnostic variant of LatentRMUParallelDDP_early: hypothesis that residual
# forget_knowmem_ROUGE on Books lives at a deeper layer than verbmem, so
# steering one level deeper should drop knowmem without harming retain.

method_args:
  module_regex: "model\\.layers\\.12"
  trainable_params_regex:
    - "model\\.layers\\.(9|10|11|12)\\.mlp\\.down_proj\\.weight"
