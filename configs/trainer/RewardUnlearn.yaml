defaults:
  - finetune

handler: RewardUnlearn

args:
  learning_rate: 1e-5        # low LR — GRPO unlearning is sensitive
  num_train_epochs: 5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  ddp_find_unused_parameters: false
  gradient_checkpointing: true

method_args:
  # ── GRPO hyperparams ────────────────────────────────────────────────────────
  grpo_beta: 1.0              # retain NLL weight
  grpo_temperature: 0.9       # sampling temperature — keep entropy high early
  grpo_num_rollouts: 8        # group size G for advantage estimation

  # ── Gradient ascent on forget NLL (v3.3) ─────────────────────────────────────
  forget_ga_weight: 0.5       # weight of forget gradient ascent term

  # ── Self-check block (Phase 2 — set true to enable) ─────────────────────────
  self_check_enabled: true   # Phase 1: verify semantic reward works without self-check
  self_check_warmup_steps: 0  # delay prefix injection (0 = from step 0 when enabled)
  format_reward_weight: 0.5   # weight of format reward in composite
  uncertainty_bonus: 0.2      # bonus when <think> expresses uncertainty

  # ── Semantic config ──────────────────────────────────────────────────────────
  semantic_model_name: "all-MiniLM-L6-v2"
  semantic_threshold: 0.7     # cosine-sim threshold for "clean answer" in format reward

  # ── Forget corpus config ─────────────────────────────────────────────────────
  hf_forget_path: "locuslab/TOFU"
  hf_forget_split: "forget10"   # override per experiment (e.g. forget01)
  question_key: "question"
  answer_key: "answer"
  test_mode: false
