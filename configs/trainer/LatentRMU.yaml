defaults:
  - GradDiff

handler: LatentRMU

args:
  learning_rate: 1e-5
  num_train_epochs: 10

method_args:
  # Layer to hook activations from (and to steer toward random vector)
  module_regex: "model\\.layers\\.7"

  # Params to update during Phase 2 (RMU-style)
  trainable_params_regex:
    - ".*"  # update all params (set to specific layers to restrict, e.g. model\\.layers\\.(5|6|7)\\.mlp\\.down_proj\\.weight)

  # Encoder / Phase 1
  latent_dim: 256           # hidden dim of PerSampleEncoder
  encoder_layers: 2         # depth of PerSampleEncoder (2=Linear-GELU-Linear, 3 adds one hidden block, etc.)
  encoder_epochs: 2         # epochs for Phase 1 (encoder training, model frozen)
  encoder_lr: 1e-3          # separate lr for encoder (typically much larger than phase 2 lr)

  # Phase 2 warmup: linearly ramp forget loss weight from 0→1 over N steps.
  # Prevents utility collapse by letting retain loss anchor the model first.
  # 0 = no warmup (immediate full forget loss).
  forget_warmup_steps: 0

  # Phase 2 (RMU unlearning)
  steering_coeff: 20        # scale factor applied to encoder output control vector
  orth_weight: 1.0          # weight on gradient-conflict orthogonality loss (Phase 1)
  retain_sep_weight: 1.0    # weight on retain-separation loss (Phase 1): penalizes r for being aligned with retain activations
  retain_pca_components: 64 # number of PCA components to track for retain basis

  # Phase 2 LoRA (optional)
  use_lora: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: null  # e.g. ["q_proj", "v_proj"]; null = peft default

  # Inherited from GradDiff / RMU
  gamma: 1.0                # forget loss weight
  alpha: 1.0                # retain loss weight
  retain_loss_type: EMBED_DIFF
